<!DOCTYPE html>
<html>
<head>
<title>Elite Gold Gallery</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(#c89b2c,#f5e2a8);
text-align:center;
}

h1{
color:white;
padding:20px;
letter-spacing:2px;
}

.contact-title{
margin-top:10px;
font-size:28px;
font-weight:bold;
}

.contact-text{
margin-bottom:20px;
}

.form-box{
width:350px;
background:white;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

textarea{
height:80px;
}

button{
width:100%;
padding:12px;
background:#e0b400;
border:none;
border-radius:5px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#c99a00;
}

</style>
</head>

<body>

<h1>ELITE GOLD GALLERY</h1>

<div class="contact-title">Contact Us</div>
<p class="contact-text">
Have questions about our jewellery collections? Send us a message!
</p>

<div class="form-box">

<form>

<input type="text" placeholder="Enter your name" required>

<input type="email" placeholder="Enter your email" required>

<input type="tel" placeholder="Enter your phone number" required>

<textarea placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
